<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: Arial;
        padding: 6px;
        width: 230px;
      }
      button {
        width: 100%;
      }
      .section {
        margin-bottom: 10px;
      }
      label {
        display: block;
        margin: 4px 0;
      }
      .extract_btn {
        background-color: #4caf50;
        color: white;
        border: none;
        padding: 20px 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <button id="extractBtn" class="extract_btn">Extract</button>
    <div class="section">
      <p>V5: 13_03_2026</p>
      <strong>Content Scope</strong>
      <label>
        <input type="radio" name="scope" value="article" />
        Article (Readability)
      </label>
      <label>
        <input type="radio" name="scope" value="full" checked />
        Full Page (DOM)
      </label>
    </div>

    <div class="section">
      <strong>Output Format</strong>
      <label>
        <input type="radio" name="format" value="html" />
        HTML
      </label>
      <label>
        <input type="radio" name="format" value="text" checked />
        Text
      </label>
    </div>
    <div class="section">
      <strong>Notes / Header Text</strong>
      <textarea
        id="userText"
        rows="4"
        style="width: 100%; resize: vertical"
        placeholder="Type text to include at top of file..."
      ></textarea>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
